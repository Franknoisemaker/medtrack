# MedTrack — Migraciones de Base de Datos Supabase
# Ejecución manual vía workflow_dispatch.
# SIEMPRE ejecutar primero con dry_run: true para verificar el diff.
# Requiere aprobación del ambiente correspondiente (staging o production).

name: DB — Migraciones Supabase

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Entorno destino'
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      dry_run:
        description: '¿Solo verificar diff sin aplicar? (recomendado primer run)'
        required: true
        type: boolean
        default: true
      deploy_functions:
        description: '¿También desplegar Edge Functions?'
        required: true
        type: boolean
        default: true

jobs:
  migrate:
    name: "Migraciones (${{ github.event.inputs.environment }}) — dry_run: ${{ github.event.inputs.dry_run }}"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link proyecto Supabase (${{ github.event.inputs.environment }})
        working-directory: expediente-medico-app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ github.event.inputs.environment == 'production' && secrets.SUPABASE_PROJECT_REF_PRODUCTION || secrets.SUPABASE_PROJECT_REF_STAGING }}
          DB_PASSWORD: ${{ github.event.inputs.environment == 'production' && secrets.SUPABASE_DB_PASSWORD_PRODUCTION || secrets.SUPABASE_DB_PASSWORD_STAGING }}
        run: |
          supabase link \
            --project-ref "${PROJECT_REF}" \
            --password "${DB_PASSWORD}"

      - name: Previsualizar migraciones pendientes (dry-run)
        working-directory: expediente-medico-app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --dry-run

      - name: "Aplicar migraciones (solo si dry_run=false)"
        if: ${{ github.event.inputs.dry_run == 'false' }}
        working-directory: expediente-medico-app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

      - name: "Desplegar Edge Functions (solo si deploy_functions=true y dry_run=false)"
        if: ${{ github.event.inputs.dry_run == 'false' && github.event.inputs.deploy_functions == 'true' }}
        working-directory: expediente-medico-app
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy auth-gate --no-verify-jwt
          supabase functions deploy create-appointment --no-verify-jwt
          supabase functions deploy get-file --no-verify-jwt
          supabase functions deploy scan-virus --no-verify-jwt
          supabase functions deploy sign-note --no-verify-jwt
          supabase functions deploy submit-onboarding --no-verify-jwt

      - name: Resumen de operación
        run: |
          echo "## Resumen de Migración" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** ${{ github.event.inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Edge Functions desplegadas:** ${{ github.event.inputs.deploy_functions }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
