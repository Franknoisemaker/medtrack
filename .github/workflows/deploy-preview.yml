# MedTrack — Deploy Preview por Pull Request
# Despliega a un ambiente de preview en Vercel por cada PR.
# Conectado al proyecto Supabase de staging.

name: Deploy — Preview (PR)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    name: Deploy Preview a Vercel
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: expediente-medico-app/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: expediente-medico-app

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Preview a Vercel
        id: deploy
        working-directory: expediente-medico-app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOYMENT_URL=$(vercel deploy \
            --token="${VERCEL_TOKEN}" \
            --env VITE_SUPABASE_URL="${{ secrets.VITE_SUPABASE_URL_STAGING }}" \
            --env VITE_SUPABASE_ANON_KEY="${{ secrets.VITE_SUPABASE_ANON_KEY_STAGING }}" \
            --yes)
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

      - name: Comentar URL de Preview en PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ✅ Preview desplegado',
                '',
                `**URL:** ${url}`,
                '',
                '> Conectado al proyecto Supabase de **staging**.',
                '> Los archivos clínicos usan el bucket R2 `medtrack-clinico-staging`.',
              ].join('\n')
            });
