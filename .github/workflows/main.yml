# MedTrack — Pipeline de Producción
# Trigger: push a main únicamente.
# Secuencia: CI (lint → tsc → test → build) → Deploy (solo si CI pasa)
# El deploy NUNCA se ejecuta si algún paso del CI falla.

name: Producción — CI → Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Integración Continua
  # ─────────────────────────────────────────
  ci:
    name: CI — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expediente-medico-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: expediente-medico-app/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Tests unitarios (Vitest)
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key-for-tests

      - name: Build de producción
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key-for-tests
          NODE_ENV: production

  # ─────────────────────────────────────────
  # JOB 2: Deploy a Producción
  # Solo se ejecuta si el job CI pasa completamente.
  # ─────────────────────────────────────────
  deploy:
    name: Deploy → medtrack.mx
    runs-on: ubuntu-latest
    needs: ci                  # ← bloqueado hasta que CI verde
    environment: production    # ← requiere aprobación manual en GitHub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: expediente-medico-app/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: expediente-medico-app

      - name: Build con variables de producción reales
        run: npm run build
        working-directory: expediente-medico-app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PROD }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_PROD }}
          NODE_ENV: production

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy a Vercel (producción)
        working-directory: expediente-medico-app
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prod \
            --token="${VERCEL_TOKEN}" \
            --yes

      - name: Marcar commit como desplegado
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'Desplegado a medtrack.mx',
              context: 'deploy/production'
            });

      - name: Notificar fallo de deploy
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Deploy falló — CI pasó pero el deploy no',
              context: 'deploy/production'
            });
